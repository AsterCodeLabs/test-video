<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Facebook Reel</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      font-family: Arial, sans-serif;
    }

    .page {
      width: 100%;
      padding: 20px;
      text-align: center;
    }

    .video-wrapper {
      width: 100%;
      max-width: 267px;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.45);
    }

    .video-wrapper iframe {
      display: block;
      width: 100%;
      height: 476px;
      border: 0;
    }

    @media (max-width: 320px) {
      .video-wrapper iframe {
        height: calc((100vw - 40px) * 476 / 267);
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="video-wrapper">
     <iframe src="https://www.facebook.com/plugins/video.php?height=476&href=https%3A%2F%2Fwww.facebook.com%2Freel%2F998357996359124%2F&show_text=false&width=267&t=0" width="267" height="476" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
    </div>
  </main>
  
</body>
</html>
